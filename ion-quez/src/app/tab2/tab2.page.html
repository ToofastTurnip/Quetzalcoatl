<ion-header>
  <ion-toolbar>
    <ion-title>Explore</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="search-wrapper">
    <ion-searchbar
      [(ngModel)]="searchQuery"
      (ionInput)="onSearch()"
      placeholder="Search posts and people…"
      debounce="200"
    ></ion-searchbar>
  </div>

  <!-- Search Results -->
  <ng-container *ngIf="isSearching">
    <div class="section-label" *ngIf="searchResults.length > 0">
      Results ({{ searchResults.length }})
    </div>
    <app-post-card
      *ngFor="let post of searchResults; trackBy: trackById"
      [post]="post"
    ></app-post-card>
    <div *ngIf="searchResults.length === 0" class="empty-state">
      <ion-icon name="search-outline"></ion-icon>
      <p>No results for "{{ searchQuery }}"</p>
    </div>
  </ng-container>

  <!-- Discovery (no search) -->
  <ng-container *ngIf="!isSearching">

    <div class="section-label">Trending</div>
    <div *ngIf="trending.length > 0" class="hashtag-chips">
      <ion-chip
        *ngFor="let item of trending; trackBy: trackByTag"
        (click)="navigateToHashtag(item.tag)"
      >
        <ion-label>#{{ item.tag }}</ion-label>
        <ion-note>&nbsp;{{ item.count }}</ion-note>
      </ion-chip>
    </div>
    <div *ngIf="trending.length === 0" class="empty-inline">No hashtags yet.</div>

    <div class="section-label">Accounts</div>
    <ion-list lines="full">
      <ion-item
        *ngFor="let user of users; trackBy: trackByHandle"
        button
        (click)="navigateToProfile(user.handle)"
        detail="false"
      >
        <div class="user-avatar" slot="start" [style.background]="user.avatarIsImage ? 'transparent' : 'var(--ion-color-primary)'">
          <img *ngIf="user.avatarIsImage" [src]="user.avatar" [alt]="user.displayName" class="avatar-img" />
          <span *ngIf="!user.avatarIsImage" class="avatar-initials">{{ user.avatar }}</span>
        </div>
        <ion-label>
          <h2>{{ user.displayName }}</h2>
          <p>&#64;{{ user.handle }} &middot; {{ user.count }} {{ user.count === 1 ? 'post' : 'posts' }}</p>
        </ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" color="medium"></ion-icon>
      </ion-item>
      <ion-item *ngIf="users.length === 0">
        <ion-label color="medium" class="ion-text-center">No accounts yet.</ion-label>
      </ion-item>
    </ion-list>

  </ng-container>

  <div style="height: 32px"></div>
</ion-content>
