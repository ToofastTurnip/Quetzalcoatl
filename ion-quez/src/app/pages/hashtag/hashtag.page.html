<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <ion-title>#{{ tag }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="hashtag-header">
    <span class="hashtag-label">#{{ tag }}</span>
  </div>

  <ng-container *ngIf="(posts$ | async) as posts">
    <app-post-card
      *ngFor="let post of posts; trackBy: trackById"
      [post]="post"
    ></app-post-card>

    <div *ngIf="posts.length === 0" class="empty-state">
      <ion-icon name="pricetag-outline" size="large"></ion-icon>
      <p>No posts with #{{ tag }}</p>
    </div>
  </ng-container>
</ion-content>
