<ion-header>
  <ion-toolbar>
    <ion-title>
      <span class="brand-icon">{{ (brand$ | async)?.iconEmoji }}</span>
      {{ (brand$ | async)?.platformName }}
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ng-container *ngIf="(posts$ | async) as posts; else loadingTpl">
    <ng-container *ngIf="posts.length > 0; else emptyTpl">
      <app-post-card
        *ngFor="let post of posts; trackBy: trackById"
        [post]="post"
      ></app-post-card>
    </ng-container>

    <ng-template #emptyTpl>
      <div class="empty-state">
        <ion-icon name="chatbubble-outline"></ion-icon>
        <p>No posts yet.</p>
        <p class="empty-sub">Tap the <strong>+</strong> button to write the first one.</p>
      </div>
    </ng-template>
  </ng-container>

  <ng-template #loadingTpl>
    <div class="empty-state">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  </ng-template>
</ion-content>

<ion-fab vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button (click)="openCreatePost()">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>
